<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Engranaje negro -->
  <g transform="translate(32,32)" fill="#222" stroke="#222" stroke-width="1.5">
    <!-- 8 dientes del engranaje -->
    <rect x="-4" y="-28" width="8" height="16" rx="1" />
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate( 45)"/>
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate( 90)"/>
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate(135)"/>
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate(180)"/>
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate(225)"/>
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate(270)"/>
    <rect x="-4" y="-28" width="8" height="16" rx="1" transform="rotate(315)"/>
    <!-- Círculo central -->
    <circle r="18" fill="none" stroke="#222" stroke-width="3"/>
  </g>
  <!-- Fondo azul -->
  <circle cx="32" cy="32" r="14" fill="#0D6EFD"/>
  <!-- Letra A blanca -->
  <text x="32" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">A</text>
</svg>
