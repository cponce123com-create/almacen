{% extends "base.html" %}
{% block title %}Registrar Salida - Almacén{% endblock %}

{% block content %}
<h4 class="mb-4"><i class="bi bi-arrow-up-circle me-2"></i>Registrar Salida (Consumo / Despacho)</h4>

{% set valores = valores if valores else {} %}

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <!-- Producto -->
                        <div class="col-12">
                            <label class="form-label">PRODUCTO <span class="text-danger">*</span></label>
                            <div class="position-relative">
                                <input type="text" class="form-control" id="productoSearch" placeholder="Buscar por código o descripción..." autocomplete="off">
                                <input type="hidden" id="producto_id" name="producto_id" value="{{ valores.get('producto_id', '') }}">
                                <div id="productoDropdown" class="dropdown-menu w-100" style="max-height: 300px; overflow-y: auto; display: none;"></div>
                                <div id="productoSelected" class="mt-1 small text-success" style="display: none;"></div>
                            </div>
                        </div>

                        <!-- Cantidad y Fecha -->
                        <div class="col-md-4">
                            <label for="cantidad" class="form-label">CANTIDAD <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad"
                                   value="{{ valores.get('cantidad', '') }}"
                                   step="0.01" min="0.01" required placeholder="0.00">
                        </div>
                        <div class="col-md-4">
                            <label for="fecha_salida" class="form-label">FECHA DE SALIDA</label>
                            <input type="date" class="form-control" id="fecha_salida" name="fecha_salida"
                                   value="{{ valores.get('fecha_salida', '') }}">
                            <div class="form-text">Dejar vacío para usar fecha actual.</div>
                        </div>
                        <div class="col-md-4">
                            <label for="nro_vale" class="form-label">N° VALE</label>
                            <input type="text" class="form-control" id="nro_vale" name="nro_vale"
                                   value="{{ valores.get('nro_vale', '') }}" maxlength="50">
                        </div>

                        <!-- OI y C. Costo -->
                        <div class="col-md-6">
                            <label for="oi" class="form-label">ORDEN INTERNA (OI)</label>
                            <input type="text" class="form-control" id="oi" name="oi"
                                   value="{{ valores.get('oi', '') }}" maxlength="50">
                        </div>
                        <div class="col-md-6">
                            <label for="c_costo" class="form-label">CENTRO DE COSTO</label>
                            <input type="text" class="form-control" id="c_costo" name="c_costo"
                                   value="{{ valores.get('c_costo', '') }}" maxlength="100">
                        </div>

                        <!-- Máquina y Categoría -->
                        <div class="col-md-6">
                            <label for="maquina" class="form-label">MÁQUINA</label>
                            <input type="text" class="form-control" id="maquina" name="maquina"
                                   value="{{ valores.get('maquina', '') }}" maxlength="100">
                        </div>
                        <div class="col-md-6">
                            <label for="categoria" class="form-label">CATEGORÍA</label>
                            <input type="text" class="form-control" id="categoria" name="categoria"
                                   value="{{ valores.get('categoria', '') }}" maxlength="100">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg me-1"></i>Registrar Salida
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const search = document.getElementById('productoSearch');
    const hidden = document.getElementById('producto_id');
    const dropdown = document.getElementById('productoDropdown');
    const selected = document.getElementById('productoSelected');
    if (!search) return;

    let debounceTimer;

    search.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const q = this.value.trim();
        if (q.length < 1) {
            dropdown.style.display = 'none';
            hidden.value = '';
            selected.style.display = 'none';
            return;
        }
        debounceTimer = setTimeout(function() {
            fetch('/api/productos?q=' + encodeURIComponent(q) + '&limit=15')
                .then(r => r.json())
                .then(data => {
                    if (data.results.length === 0) {
                        dropdown.innerHTML = '<div class="dropdown-item text-muted">Sin resultados</div>';
                        dropdown.style.display = 'block';
                        return;
                    }
                    let html = '';
                    data.results.forEach(function(p) {
                        html += '<button type="button" class="dropdown-item" data-id="' + p.id + '" data-codigo="' + p.codigo + '" data-desc="' + p.descripcion + '" data-stock="' + p.stock_actual + '" data-um="' + p.um + '">';
                        html += '<strong>[' + p.codigo + ']</strong> ' + (p.descripcion || '').substring(0, 40);
                        html += ' <span class="text-muted small">(' + p.stock_actual + ' ' + p.um + ')</span>';
                        html += '</button>';
                    });
                    dropdown.innerHTML = html;
                    dropdown.style.display = 'block';

                    dropdown.querySelectorAll('.dropdown-item').forEach(function(item) {
                        item.addEventListener('click', function() {
                            hidden.value = this.dataset.id;
                            search.value = '[' + this.dataset.codigo + '] ' + this.dataset.desc;
                            dropdown.style.display = 'none';
                            selected.innerHTML = '✅ <strong>' + this.dataset.codigo + '</strong> - ' + this.dataset.desc + ' <button type="button" class="btn btn-sm btn-outline-danger ms-2" id="clearProduct">✕</button>';
                            if (this.dataset.stock) {
                                selected.innerHTML += ' <span class="badge bg-info">Stock: ' + parseFloat(this.dataset.stock).toFixed(2) + ' ' + (this.dataset.um || '') + '</span>';
                            }
                            selected.style.display = 'block';
                        });
                    });
                });
        }, 200);
    });

    document.addEventListener('click', function(e) {
        if (e.target && e.target.id === 'clearProduct') {
            search.value = '';
            hidden.value = '';
            selected.style.display = 'none';
            search.focus();
        }
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('#productoSearch') && !e.target.closest('#productoDropdown')) {
            dropdown.style.display = 'none';
        }
    });
})();
</script>
{% endblock %}
