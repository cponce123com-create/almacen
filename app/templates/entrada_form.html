{% extends "base.html" %}
{% block title %}Registrar Entrada - Almacén{% endblock %}

{% block content %}
<h4 class="mb-4"><i class="bi bi-arrow-down-circle me-2"></i>Registrar Entrada (Ingreso)</h4>

{% set valores = valores if valores else {} %}

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <!-- Producto -->
                        <div class="col-12">
                            <label for="producto_id" class="form-label">PRODUCTO <span class="text-danger">*</span></label>
                            <select class="form-select" id="producto_id" name="producto_id" required>
                                <option value="">— Seleccionar producto —</option>
                                {% for prod in productos %}
                                <option value="{{ prod.id }}"
                                    {{ 'selected' if valores.get('producto_id')|string == prod.id|string }}>
                                    [{{ prod.codigo }}] {{ prod.descripcion }} ({{ prod.um }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Cantidad y U.M. -->
                        <div class="col-md-4">
                            <label for="cantidad" class="form-label">CANTIDAD <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad"
                                   value="{{ valores.get('cantidad', '') }}"
                                   step="0.01" min="0.01" required placeholder="0.00">
                        </div>

                        <!-- Fecha -->
                        <div class="col-md-4">
                            <label for="fecha_ingreso" class="form-label">FECHA DE INGRESO</label>
                            <input type="date" class="form-control" id="fecha_ingreso" name="fecha_ingreso"
                                   value="{{ valores.get('fecha_ingreso', '') }}">
                            <div class="form-text">Dejar vacío para usar fecha actual.</div>
                        </div>

                        <!-- ALM -->
                        <div class="col-md-4">
                            <label for="alm" class="form-label">ALMACÉN</label>
                            <input type="text" class="form-control" id="alm" name="alm"
                                   value="{{ valores.get('alm', 'ALM-01') }}" maxlength="50">
                        </div>

                        <!-- Zona y Ubicación -->
                        <div class="col-md-6">
                            <label for="zona" class="form-label">ZONA</label>
                            <input type="text" class="form-control" id="zona" name="zona"
                                   value="{{ valores.get('zona', '') }}" maxlength="50" placeholder="Ej: ZONA-A">
                        </div>
                        <div class="col-md-6">
                            <label for="ubicacion" class="form-label">UBICACIÓN</label>
                            <input type="text" class="form-control" id="ubicacion" name="ubicacion"
                                   value="{{ valores.get('ubicacion', '') }}" maxlength="100" placeholder="Ej: EST-01">
                        </div>

                        <!-- OC y Guía -->
                        <div class="col-md-6">
                            <label for="oc" class="form-label">ORDEN DE COMPRA (OC)</label>
                            <input type="text" class="form-control" id="oc" name="oc"
                                   value="{{ valores.get('oc', '') }}" maxlength="50">
                        </div>
                        <div class="col-md-6">
                            <label for="guia_remision" class="form-label">GUÍA DE REMISIÓN</label>
                            <input type="text" class="form-control" id="guia_remision" name="guia_remision"
                                   value="{{ valores.get('guia_remision', '') }}" maxlength="50">
                        </div>

                        <!-- Familia -->
                        <div class="col-md-6">
                            <label for="familia" class="form-label">FAMILIA</label>
                            <input type="text" class="form-control" id="familia" name="familia"
                                   value="{{ valores.get('familia', '') }}" maxlength="100">
                            <div class="form-text">Se usará la familia del producto si se deja vacío.</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg me-1"></i>Registrar Entrada
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
