{% extends "base.html" %}
{% block title %}{% if almacen %}Editar Almacén{% else %}Nuevo Almacén{% endif %} - Control de Inventarios{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">
                    <i class="bi bi-building me-2"></i>
                    {% if almacen %}Editar Almacén{% else %}Nuevo Almacén{% endif %}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="codigo" class="form-label">Código <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="codigo" name="codigo"
                               value="{{ valores.codigo or (almacen.codigo if almacen else '') }}"
                               placeholder="Ej: ALM-02" required maxlength="20"
                               {% if almacen and almacen.codigo == 'ALM-01' %}readonly{% endif %}>
                    </div>
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombre" name="nombre"
                               value="{{ valores.nombre or (almacen.nombre if almacen else '') }}"
                               placeholder="Nombre del almacén" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección</label>
                        <input type="text" class="form-control" id="direccion" name="direccion"
                               value="{{ valores.direccion or (almacen.direccion if almacen else '') }}"
                               placeholder="Dirección del almacén (opcional)" maxlength="200">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('routes.almacenes') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
