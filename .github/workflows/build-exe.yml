name: Compilar .exe para Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -q -r requirements-lite.txt && pip install -q pyinstaller

      - name: Compilar ALMACENERO.exe
        run: pyinstaller --name ALMACENERO --noconsole --add-data "app/templates;app/templates" --add-data "app/static;app/static" --hidden-import flask --hidden-import flask_sqlalchemy --hidden-import flask_login --hidden-import flask_migrate --hidden-import flask_wtf --hidden-import openpyxl --exclude-module tkinter --exclude-module numpy --exclude-module pandas --exclude-module matplotlib --exclude-module PIL --exclude-module pip --exclude-module setuptools --exclude-module psycopg2 --exclude-module gunicorn app/app.py

      - name: Subir .exe compilado
        uses: actions/upload-artifact@v4
        with:
          name: ALMACENERO-Windows-Portable
          path: dist/ALMACENERO/
